<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>꿀빵지 · 업보</title>
<link rel="icon" type="image/jpeg" href="https://profile.img.sooplive.co.kr/LOGO/20/2059865/2059865.jpg">
<style>
@font-face{font-family:'Malang';
 src:url('../GeekbleMalang2.woff2') format('woff2'),url('../GeekbleMalang2.woff') format('woff');
 font-weight:400;font-style:normal;font-display:swap}

:root{
  --bg:#FFF6E4; --page:#FFFBF0; --card:#FFFDF7; --card2:#FFF7E6;
  --pink:#FFD9E8; --pink-s:#FFF0F6; --pink-d:#F08BB0;
  --gold:#E8A33D; --gold-d:#D08F2E; --cream:#FFF3D6;
  --text:#6B5847; --text-s:#9C8570; --line:#F6E3C6; --line-p:#FBD9E6;
  --sh:0 8px 24px rgba(224,169,59,.10);
}
body.dark{
  --bg:#241C22; --page:#2C2430; --card:#342B36; --card2:#3B3140;
  --pink:#5A3A50; --pink-s:#40303E; --pink-d:#FFB4D4;
  --gold:#FFC96B; --gold-d:#FFB4D4; --cream:#453A2E;
  --text:#F5E9DC; --text-s:#C3A9A0; --line:#4E3D4A; --line-p:#5A3F52;
  --sh:0 8px 24px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malang',sans-serif;color:var(--text);line-height:1.75;-webkit-font-smoothing:antialiased;
 text-rendering:optimizeLegibility;-moz-osx-font-smoothing:grayscale;
 background-color:var(--bg);
 background-image:radial-gradient(circle at 12% 18%, rgba(255,217,232,.30) 0 12%, transparent 42%),
  radial-gradient(circle at 88% 8%, rgba(255,243,214,.55) 0 12%, transparent 40%);
 background-attachment:fixed;padding:26px 16px}
body.dark{background-image:none}
img{max-width:100%;display:block}a{text-decoration:none;color:inherit}ul{list-style:none}
h1,h2,h3,h4,.ttl,.en,.s-logo b{font-family:'Malang',sans-serif;font-weight:400;letter-spacing:.3px}
b,.tag,.ask,.sm,.badge{font-family:'Malang',sans-serif;font-weight:700;letter-spacing:-.2px}
.ic{flex:none;vertical-align:middle}.avatar{cursor:pointer}
.s-av{cursor:pointer}
.stk{position:absolute;z-index:5;pointer-events:none;filter:drop-shadow(0 4px 8px rgba(224,169,59,.22))}
.grid{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:212px 1fr;gap:22px;align-items:start}
.page,.side{opacity:0;transition:opacity .35s}
body.ready .page,body.ready .side{opacity:1}
.page{background:var(--page);border-radius:34px;padding:22px;display:grid;gap:18px;min-width:0;
 box-shadow:0 24px 60px rgba(200,150,90,.16)}
.side{position:sticky;top:26px;background:var(--card);border:2px solid var(--line);border-radius:30px;
 padding:22px 14px 24px;display:grid;justify-items:center;gap:10px;box-shadow:var(--sh)}
.s-av{width:118px;height:118px;border-radius:50%;padding:5px;background:var(--pink)}
.s-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.s-logo{text-align:center;margin-top:2px}
.s-logo b{display:block;font-size:26px;color:var(--gold);line-height:1.1}
.s-logo span{display:inline-flex;align-items:center;gap:4px;font-family:'Malang',sans-serif;font-size:14px;color:var(--pink-d)}
.s-menu{display:grid;gap:8px;width:100%;margin-top:4px}
.sm{display:flex;align-items:center;gap:9px;padding:11px 16px;border-radius:999px;background:var(--card2);
 border:2px solid var(--line-p);font-size:15px;color:var(--text);transition:.16s}
.sm:hover{background:var(--pink-s);transform:translateY(-2px)}
.sm.on{background:var(--pink);color:var(--pink-d)}
.s-cat img{width:52px;height:52px;object-fit:contain}
.s-line{width:86%;border-top:2px dashed var(--line-p);margin:2px 0}
.s-tags{display:grid;gap:6px;width:100%;margin-top:4px}
.tag{display:inline-block;background:var(--pink-s);color:var(--pink-d);font-size:12.5px;padding:6px 14px;
 border-radius:999px;border:1.5px solid var(--line-p);text-align:center}
.s-util{display:flex;align-items:center;gap:8px;margin-top:4px}
.ask{border:0;cursor:pointer;background:var(--pink);color:var(--pink-d);border-radius:999px;padding:9px 20px;font-size:14px}
.dk{width:22px;height:33px;flex:none;border-radius:999px;background:var(--cream);border:2px solid var(--line);
 position:relative;cursor:pointer}
.dk .knob{position:absolute;left:2px;top:2px;width:14px;height:14px;border-radius:50%;background:var(--pink);transition:.22s}
body.dark .dk .knob{top:13px;background:var(--pink-d)}
.card{position:relative;background:var(--card);border:2px solid var(--line);border-radius:24px;padding:24px 30px;
 box-shadow:var(--sh)}
.ttl{display:flex;align-items:center;gap:8px;font-size:19px;color:var(--gold);
 padding-bottom:10px;margin-bottom:16px;border-bottom:2px dashed var(--line)}
.ttl .r{margin-left:auto;font-family:'Malang';font-weight:700;font-size:12.5px;color:var(--text-s)}
.phead{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.phead h1{font-size:32px;color:var(--gold)}
.phead .sub{font-family:'Malang',sans-serif;font-weight:700;font-size:18px;color:var(--pink-d)}
footer{text-align:center;color:var(--text-s);font-size:12px;line-height:1.8;padding:14px 0 4px}
.modal{position:fixed;inset:0;background:rgba(120,95,70,.34);display:none;place-items:center;z-index:95;padding:20px}
.modal.on{display:grid}
.modal .mb{background:var(--card);border:3px solid var(--pink);border-radius:24px;padding:26px;width:100%;max-width:420px}
.modal h2{font-family:'Malang',sans-serif;color:var(--pink-d);margin-bottom:12px;font-size:21px}
.modal textarea{width:100%;height:130px;border:2px solid var(--line);border-radius:14px;padding:13px;font-family:'Malang',sans-serif;
 font-size:14px;resize:none;background:var(--card2);color:var(--text);outline:none}
.modal .mr{display:flex;gap:8px;margin-top:12px}
.modal .mr button{flex:1;padding:12px;border:0;border-radius:12px;cursor:pointer;font-family:'Malang',sans-serif;font-size:15px}
.modal .mr .ok{background:var(--pink-d);color:#fff}
.modal .mr .no{background:var(--cream);color:var(--gold)}
@media(max-width:1240px){
 .grid{grid-template-columns:168px 1fr;gap:14px}
 .side{padding:16px 10px 18px;border-radius:24px;gap:8px}
 .s-av{width:84px;height:84px;padding:4px}
 .s-logo b{font-size:19px}
 .s-logo span{font-size:11.5px}
 .sm{padding:9px 12px;font-size:13px;gap:6px}
 .sm svg{width:16px;height:16px}
 .s-cat svg{width:28px;height:28px}
 .tag{font-size:11px;padding:5px 10px}
 .ask{padding:7px 14px;font-size:13px}
 .card{padding:18px 22px}
 .stk{transform:scale(.78)}
}
@media(max-width:780px){.grid{grid-template-columns:1fr}.side{position:static}}

.search{width:100%;padding:13px 20px;border-radius:999px;border:2px solid var(--line);font-size:14px;outline:none;
 background:var(--card2);color:var(--text);margin-bottom:18px;font-family:'Malang',sans-serif}
.search:focus{border-color:var(--pink-d)}
.vgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.vc{background:var(--card2);border:2px solid var(--line);border-radius:18px;padding:20px 12px;text-align:center;
 cursor:pointer;transition:.18s}
.vc:hover{transform:translateY(-4px);border-color:var(--line-p);box-shadow:0 12px 26px rgba(224,169,59,.18)}
.vfb{width:62px;height:62px;border-radius:50%;margin:0 auto 10px;display:grid;place-items:center;
 background:var(--pink);color:#fff;font-family:'Malang',sans-serif;font-size:26px;border:3px solid var(--line-p)}
.vfb.big{width:52px;height:52px;font-size:22px;margin:0}
.vn{display:block;font-size:15px;color:var(--text)}
.vi{display:block;font-style:normal;font-size:11px;color:var(--text-s);margin:2px 0 9px}
.vt{display:inline-block;background:var(--pink-d);color:#fff;border-radius:999px;padding:3px 14px;font-size:12px;font-weight:700}
.empty{display:none;text-align:center;padding:50px 0;color:var(--text-s);font-size:14px}
.ov{position:fixed;inset:0;background:rgba(90,70,55,.5);display:none;place-items:center;z-index:98;padding:20px}
.ov.on{display:grid}
.vm{background:var(--card);border:3px solid var(--pink);border-radius:24px;width:100%;max-width:430px;
 max-height:82vh;display:flex;flex-direction:column;overflow:hidden;animation:pop .2s ease}
@keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.vm-top{display:flex;align-items:center;gap:12px;padding:20px 22px 16px;border-bottom:2px dashed var(--line);position:relative}
.vm-nick{display:block;font-family:'Malang',sans-serif;font-weight:400;font-size:19px;color:var(--gold);line-height:1.2}
.vm-id{font-style:normal;font-size:12px;color:var(--text-s)}
.vm-total{margin-left:auto;margin-right:26px;background:var(--pink);color:var(--pink-d);border-radius:999px;
 padding:4px 14px;font-size:12px;font-weight:700}
.vm-x{position:absolute;top:14px;right:16px;background:none;border:0;font-size:18px;color:var(--text-s);cursor:pointer}
.vm-body{padding:16px 20px 22px;overflow-y:auto}
.urow{display:flex;align-items:center;gap:10px;padding:11px 15px;margin-bottom:8px;background:var(--card2);
 border:2px solid var(--line);border-radius:14px}
.urow .nm{flex:1;font-size:14px;color:var(--text);font-weight:500}
.urow .ev{font-size:10px;font-weight:700;color:var(--pink-d);background:var(--pink-s);padding:2px 9px;
 border-radius:999px;border:1.5px solid var(--line-p)}
.urow .ct{font-size:14px;font-weight:700;color:var(--gold);background:var(--card);border:2px solid var(--line);
 border-radius:999px;padding:2px 13px;min-width:42px;text-align:center}
@media(max-width:1100px){.vgrid{grid-template-columns:repeat(2,1fr)}}

/* ── 전체 폰트 통일 ── */
*,*::before,*::after{font-family:'Malang',sans-serif !important;font-weight:400 !important}
b,strong,h1,h2,h3,h4,.rh{font-weight:400 !important}

<div class="modal" id="askModal"><div class="mb"><h2>문의 보내기</h2>

 <div class="mr"><button class="no" onclick="closeAsk()">닫기</button><button class="ok" onclick="sendAsk()">보내기</button></div>
</div></div>
<script>
function toggleDark(){document.body.classList.toggle('dark');
 localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');}
function openAsk(){document.getElementById('askModal').classList.add('on')}
function closeAsk(){document.getElementById('askModal').classList.remove('on')}

document.addEventListener('click',function(e){var a=e.target.closest('.avatar');if(!a)return;
 a.animate([
   {transform:'scale(1)'},
   {transform:'scale(1.08) rotate(-1.6deg)',offset:.30},
   {transform:'scale(.97) rotate(1.2deg)',offset:.58},
   {transform:'scale(1.03) rotate(-.5deg)',offset:.80},
   {transform:'scale(1)'}
  ],{duration:1900,easing:'cubic-bezier(.28,1.1,.36,1)'});
 for(var i=0;i<6;i++){var s=document.createElementNS('http://www.w3.org/2000/svg','svg');
  var u=document.createElementNS('http://www.w3.org/2000/svg','use');u.setAttribute('href', i%2?'#i-heart':'#i-berry');s.appendChild(u);
  s.setAttribute('width',22);s.setAttribute('height',22);
  s.style.cssText='position:fixed;left:'+e.clientX+'px;top:'+e.clientY+'px;z-index:99;pointer-events:none;transition:1.4s cubic-bezier(.18,.72,.3,1)';
  document.body.appendChild(s);
  (function(s){setTimeout(function(){
   s.style.transform='translate('+(Math.random()*170-85)+'px,'+(-70-Math.random()*90)+'px) scale(.4) rotate('+(Math.random()*50-25)+'deg)';
   s.style.opacity=0;},10);setTimeout(function(){s.remove()},1500);})(s);}});

function openV(nick,id,tot,rows){
 document.getElementById('mAv').textContent=nick[0];
 document.getElementById('mNick').textContent=nick;
 document.getElementById('mId').textContent='@'+id;
 document.getElementById('mTot').textContent='총 '+tot+'개';
 document.getElementById('mBody').innerHTML=rows||'<p class="empty" style="display:block">업보가 없어요!</p>';
 document.getElementById('ov').classList.add('on');
}
function closeV(e){if(e&&e.target.closest('.vm'))return;document.getElementById('ov').classList.remove('on')}
function filt(){
 var q=document.getElementById('q').value.trim().toLowerCase(),n=0;
 document.querySelectorAll('.vc').forEach(function(c){
   var ok=!q||c.dataset.nick.toLowerCase().includes(q)||c.dataset.id.toLowerCase().includes(q);
   c.style.display=ok?'block':'none'; if(ok)n++;
 });
 document.getElementById('empty').style.display=n?'none':'block';
}
</script>
