<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>꿀빵지 · 옷장</title>
<link rel="icon" type="image/jpeg" href="https://profile.img.sooplive.co.kr/LOGO/20/2059865/2059865.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'Malang';
 src:url('../GeekbleMalang2.woff2') format('woff2'),url('../GeekbleMalang2.woff') format('woff');
 font-weight:400;font-style:normal;font-display:swap}

:root{
  --bg:#FFF6E4; --page:#FFFBF0; --card:#FFFDF7; --card2:#FFF7E6;
  --pink:#FFD9E8; --pink-s:#FFF0F6; --pink-d:#F08BB0;
  --gold:#E8A33D; --gold-d:#D08F2E; --cream:#FFF3D6;
  --text:#6B5847; --text-s:#9C8570; --line:#F6E3C6; --line-p:#FBD9E6;
  --sh:0 8px 24px rgba(224,169,59,.10);
}
body.dark{
  --bg:#241C22; --page:#2C2430; --card:#342B36; --card2:#3B3140;
  --pink:#5A3A50; --pink-s:#40303E; --pink-d:#FFB4D4;
  --gold:#FFC96B; --gold-d:#FFB4D4; --cream:#453A2E;
  --text:#F5E9DC; --text-s:#C3A9A0; --line:#4E3D4A; --line-p:#5A3F52;
  --sh:0 8px 24px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malang','Noto Sans KR',sans-serif;color:var(--text);line-height:1.75;-webkit-font-smoothing:antialiased;
 text-rendering:optimizeLegibility;-moz-osx-font-smoothing:grayscale;
 background-color:var(--bg);
 background-image:radial-gradient(circle at 12% 18%, rgba(255,217,232,.30) 0 12%, transparent 42%),
  radial-gradient(circle at 88% 8%, rgba(255,243,214,.55) 0 12%, transparent 40%);
 background-attachment:fixed;padding:26px 16px}
body.dark{background-image:none}
img{max-width:100%;display:block}a{text-decoration:none;color:inherit}ul{list-style:none}
h1,h2,h3,h4,.ttl,.en,.s-logo b{font-family:'Malang','Jua',sans-serif;font-weight:400;letter-spacing:.3px}
b,.tag,.ask,.sm,.badge{font-family:'Malang','Noto Sans KR',sans-serif;font-weight:700;letter-spacing:-.2px}
.ic{flex:none;vertical-align:middle}.avatar{cursor:pointer}
.s-av{cursor:pointer}
.stk{position:absolute;z-index:5;pointer-events:none;filter:drop-shadow(0 4px 8px rgba(224,169,59,.22))}
.grid{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:212px 1fr;gap:22px;align-items:start}
.page,.side{opacity:0;transition:opacity .35s}
body.ready .page,body.ready .side{opacity:1}
.page{background:var(--page);border-radius:34px;padding:22px;display:grid;gap:18px;min-width:0;
 box-shadow:0 24px 60px rgba(200,150,90,.16)}
.side{position:sticky;top:26px;background:var(--card);border:2px solid var(--line);border-radius:30px;
 padding:22px 14px 24px;display:grid;justify-items:center;gap:10px;box-shadow:var(--sh)}
.s-av{width:118px;height:118px;border-radius:50%;padding:5px;background:var(--pink)}
.s-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.s-logo{text-align:center;margin-top:2px}
.s-logo b{display:block;font-size:26px;color:var(--gold);line-height:1.1}
.s-logo span{display:inline-flex;align-items:center;gap:4px;font-family:'Malang','Jua';font-size:14px;color:var(--pink-d)}
.s-menu{display:grid;gap:8px;width:100%;margin-top:4px}
.sm{display:flex;align-items:center;gap:9px;padding:11px 16px;border-radius:999px;background:var(--card2);
 border:2px solid var(--line-p);font-size:15px;color:var(--text);transition:.16s}
.sm:hover{background:var(--pink-s);transform:translateY(-2px)}
.sm.on{background:var(--pink);color:var(--pink-d)}
.s-line{width:86%;border-top:2px dashed var(--line-p);margin:2px 0}
.s-tags{display:grid;gap:6px;width:100%;margin-top:4px}
.tag{display:inline-block;background:var(--pink-s);color:var(--pink-d);font-size:12.5px;padding:6px 14px;
 border-radius:999px;border:1.5px solid var(--line-p);text-align:center}
.s-util{display:flex;align-items:center;gap:8px;margin-top:4px}
.ask{border:0;cursor:pointer;background:var(--pink);color:var(--pink-d);border-radius:999px;padding:9px 20px;font-size:14px}
.dk{width:22px;height:33px;flex:none;border-radius:999px;background:var(--cream);border:2px solid var(--line);
 position:relative;cursor:pointer}
.dk .knob{position:absolute;left:2px;top:2px;width:14px;height:14px;border-radius:50%;background:var(--pink);transition:.22s}
body.dark .dk .knob{top:13px;background:var(--pink-d)}
.card{position:relative;background:var(--card);border:2px solid var(--line);border-radius:24px;padding:24px 30px;
 box-shadow:var(--sh)}
.ttl{display:flex;align-items:center;gap:8px;font-size:19px;color:var(--gold);
 padding-bottom:10px;margin-bottom:16px;border-bottom:2px dashed var(--line)}
.ttl .r{margin-left:auto;font-family:'Noto Sans KR';font-weight:700;font-size:12.5px;color:var(--text-s)}
.phead{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.phead h1{font-size:32px;color:var(--gold)}
.phead .sub{font-family:'Gaegu',cursive;font-weight:700;font-size:18px;color:var(--pink-d)}
footer{text-align:center;color:var(--text-s);font-size:12px;line-height:1.8;padding:14px 0 4px}
.modal{position:fixed;inset:0;background:rgba(120,95,70,.34);display:none;place-items:center;z-index:95;padding:20px}
.modal.on{display:grid}
.modal .mb{background:var(--card);border:3px solid var(--pink);border-radius:24px;padding:26px;width:100%;max-width:420px}
.modal h2{font-family:'Malang','Jua';color:var(--pink-d);margin-bottom:12px;font-size:21px}
.modal textarea{width:100%;height:130px;border:2px solid var(--line);border-radius:14px;padding:13px;font-family:inherit;
 font-size:14px;resize:none;background:var(--card2);color:var(--text);outline:none}
.modal .mr{display:flex;gap:8px;margin-top:12px}
.modal .mr button{flex:1;padding:12px;border:0;border-radius:12px;cursor:pointer;font-family:'Malang','Jua';font-size:15px}
.modal .mr .ok{background:var(--pink-d);color:#fff}
.modal .mr .no{background:var(--cream);color:var(--gold)}
@media(max-width:1240px){
 .grid{grid-template-columns:168px 1fr;gap:14px}
 .side{padding:16px 10px 18px;border-radius:24px;gap:8px}
 .s-av{width:84px;height:84px;padding:4px}
 .s-logo b{font-size:19px}
 .s-logo span{font-size:11.5px}
 .sm{padding:9px 12px;font-size:13px;gap:6px}
 .sm svg{width:16px;height:16px}
 .s-cat svg{width:28px;height:28px}
 .tag{font-size:11px;padding:5px 10px}
 .ask{padding:7px 14px;font-size:13px}
 .card{padding:18px 22px}
 .stk{transform:scale(.78)}
}
@media(max-width:780px){.grid{grid-template-columns:1fr}.side{position:static}}

.mode{display:flex;gap:10px;margin-bottom:14px}
.md{flex:1;border:2px solid var(--line);cursor:pointer;background:var(--card2);color:var(--text-s);
 border-radius:16px;padding:12px;font-size:15px;font-weight:700;display:flex;align-items:center;
 justify-content:center;gap:7px;transition:.16s}
.md.on{background:var(--pink);border-color:var(--line-p);color:var(--pink-d)}
.tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.tb{border:2px solid var(--line);cursor:pointer;background:var(--card2);color:var(--text-s);
 border-radius:999px;padding:7px 20px;font-size:13px;font-weight:700;transition:.16s}
.tb.on{background:var(--pink);border-color:var(--line-p);color:var(--pink-d)}

.ph-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;
 border-bottom:2px solid var(--gold);padding-bottom:8px;margin-bottom:20px}
.ph-t{font-family:'Malang','Jua',sans-serif;font-size:30px;line-height:1;letter-spacing:1px;
 background:linear-gradient(90deg,var(--gold),var(--pink-d));-webkit-background-clip:text;background-clip:text;
 -webkit-text-fill-color:transparent}
.ph-m{font-size:11.5px;font-weight:700;letter-spacing:.14em;color:var(--text-s);white-space:nowrap;padding-bottom:4px}

/* ── 새 옷 = 포스터 ── */
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.poster{position:relative;aspect-ratio:3/4;border-radius:16px;overflow:hidden;cursor:pointer;background:#3a2f2a;
 box-shadow:0 10px 26px rgba(190,150,100,.22);transition:.24s}
.poster:hover{transform:translateY(-6px);box-shadow:0 18px 40px rgba(190,150,100,.3)}
.poster img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 8%;transition:transform .5s ease}
.poster:hover img{transform:scale(1.06)}
.poster::before{content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
 background:linear-gradient(to bottom,rgba(60,40,35,.45),transparent 26%,transparent 48%,rgba(60,40,35,.9))}
.poster .frame{position:absolute;inset:11px;border:1.5px solid rgba(255,255,255,.55);border-radius:9px;z-index:3;pointer-events:none}
.poster .p-top{position:absolute;top:0;left:0;right:0;z-index:4;padding:17px 18px;display:flex;
 align-items:flex-start;justify-content:space-between;gap:8px;color:#fff}
.p-brand{font-size:10.5px;font-weight:800;letter-spacing:.24em;text-shadow:0 1px 4px rgba(0,0,0,.6)}
.p-new{font-size:10px;font-weight:800;letter-spacing:.08em;background:var(--pink-d);color:#fff;padding:3px 11px;
 border-radius:999px;box-shadow:0 2px 10px rgba(0,0,0,.35)}
.poster .p-bottom{position:absolute;left:0;right:0;bottom:0;z-index:4;padding:18px 19px 20px;color:#fff}
.p-cat{display:inline-block;font-size:10.5px;font-weight:800;letter-spacing:.06em;color:#fff;
 background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);padding:3px 12px;border-radius:999px;margin-bottom:10px}
.p-line{display:block;width:26px;height:2.5px;background:var(--pink);margin-bottom:10px;border-radius:2px}
.p-name{font-family:'Malang','Jua',sans-serif;font-weight:400;font-size:23px;line-height:1.16;
 text-shadow:0 2px 8px rgba(0,0,0,.6);word-break:keep-all;letter-spacing:.5px}
.p-meta{margin-top:8px;font-size:11px;opacity:.92;text-shadow:0 1px 3px rgba(0,0,0,.55);letter-spacing:.06em}
.p-desc{font-size:11.5px;opacity:.85;margin-top:6px;line-height:1.45;text-shadow:0 1px 3px rgba(0,0,0,.55)}

/* ── 기존 옷 = 앨범 ── */
.agrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.item{position:relative;aspect-ratio:3/4;border-radius:18px;overflow:hidden;cursor:pointer;
 border:2px solid var(--line);background:var(--card2);transition:.2s}
.item:hover{transform:translateY(-4px);border-color:var(--line-p);box-shadow:0 12px 26px rgba(224,169,59,.2)}
.item img{width:100%;height:100%;object-fit:cover;object-position:center 8%;transition:transform .35s ease}
.item:hover img{transform:scale(1.05)}
.i-cap{position:absolute;left:0;right:0;bottom:0;padding:26px 14px 12px;pointer-events:none;color:#fff;
 background:linear-gradient(to top,rgba(60,40,35,.8),rgba(60,40,35,.3) 55%,transparent)}
.i-cap b{display:block;font-size:14.5px;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.i-cap em{font-style:normal;font-size:11px;opacity:.9}

.empty{display:none;text-align:center;padding:56px 0;color:var(--text-s);font-size:14px}

/* 라이트박스 */
.lb{position:fixed;inset:0;background:rgba(60,45,38,.88);display:none;place-items:center;z-index:99;padding:28px;cursor:zoom-out}
.lb.on{display:grid}
.lb-x{position:absolute;top:18px;right:26px;color:#fff;font-size:28px;cursor:pointer;opacity:.85}
.lb-in{display:grid;justify-items:center;max-width:92%}
.lb img{max-height:74vh;border-radius:16px;box-shadow:0 16px 50px rgba(0,0,0,.45)}
.lb-cap{margin-top:16px;text-align:center;color:#fff}
.lb-cap b{font-family:'Malang','Jua';font-weight:400;font-size:19px}
.lb-cap p{font-size:13px;opacity:.82;margin-top:4px}
@media(max-width:1100px){.pgrid{grid-template-columns:repeat(2,1fr)}.agrid{grid-template-columns:repeat(3,1fr)}}

<script>
function toggleDark(){document.body.classList.toggle('dark');
 localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');}
function openAsk(){document.getElementById('askModal').classList.add('on')}
function closeAsk(){document.getElementById('askModal').classList.remove('on')}

document.addEventListener('click',function(e){var a=e.target.closest('.avatar');if(!a)return;
 a.animate([{transform:'scale(1)'},{transform:'scale(1.14) rotate(-3deg)'},{transform:'scale(.94) rotate(2deg)'},{transform:'scale(1.06)'},{transform:'scale(1)'}],{duration:620,easing:'cubic-bezier(.2,1.4,.4,1)'});
 for(var i=0;i<6;i++){var s=document.createElementNS('http://www.w3.org/2000/svg','svg');
  var u=document.createElementNS('http://www.w3.org/2000/svg','use');u.setAttribute('href', i%2?'#i-heart':'#i-berry');s.appendChild(u);
  s.setAttribute('width',22);s.setAttribute('height',22);
  s.style.cssText='position:fixed;left:'+e.clientX+'px;top:'+e.clientY+'px;z-index:99;pointer-events:none;transition:.8s ease-out';
  document.body.appendChild(s);
  (function(s){setTimeout(function(){
   s.style.transform='translate('+(Math.random()*140-70)+'px,'+(-55-Math.random()*70)+'px) scale(.4) rotate('+(Math.random()*50-25)+'deg)';
   s.style.opacity=0;},10);setTimeout(function(){s.remove()},840);})(s);}});

var MODE='new', CAT='all';
function drMode(m,el){MODE=m;document.querySelectorAll('.md').forEach(b=>b.classList.remove('on'));el.classList.add('on');
 document.getElementById('phT').textContent = m==='new' ? 'NEW ARRIVALS' : 'ARCHIVE';
 render();}
function drCat(c,el){CAT=c;document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));el.classList.add('on');render()}
function render(){
 var pg=document.getElementById('pgrid'), ag=document.getElementById('agrid'), n=0;
 pg.style.display = MODE==='new' ? 'grid' : 'none';
 ag.style.display = MODE==='old' ? 'grid' : 'none';
 var sel = MODE==='new' ? '.poster' : '.item';
 document.querySelectorAll(sel).forEach(function(p){
   var okM = MODE==='new' ? p.dataset.new==='1' : p.dataset.new==='0';
   var okC = CAT==='all' || p.dataset.c===CAT;
   var ok = okM && okC;
   p.style.display = ok ? 'block' : 'none';
   if(ok) n++;
 });
 document.getElementById('empty').style.display = n ? 'none' : 'block';
}
render();
function openLb(_,el){
 document.getElementById('lbi').src=el.dataset.src;
 document.getElementById('lbn').textContent=el.dataset.name;
 document.getElementById('lbd').textContent=el.dataset.desc||'';
 document.getElementById('lb').classList.add('on');
}
function closeLb(){document.getElementById('lb').classList.remove('on')}
</script>
